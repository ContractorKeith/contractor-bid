name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "17 10 * * 1"

permissions:
  contents: read

jobs:
  python-security:
    name: Python and dependency security
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[mcp]" bandit detect-secrets pip-audit

      - name: Bandit static security scan
        run: python -m bandit -r src scripts -x tests --severity-level medium

      - name: Audit project dependencies
        run: python -m pip_audit --progress-spinner off .

      - name: Audit installed optional dependency tree
        run: python -m pip_audit --progress-spinner off --local --skip-editable

      - name: Secret pattern scan
        run: |
          detect-secrets scan \
            --all-files \
            --exclude-files '^(\.git/|dist/|\.claude/worktrees/|\.ruff_cache/|packaging/homebrew/contractor-bid\.rb$)' \
            > detect-secrets.json
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("detect-secrets.json").read_text(encoding="utf-8"))
          findings = data.get("results", {})
          if findings:
              for filename, items in findings.items():
                  print(f"{filename}: {len(items)} potential secret(s)")
              raise SystemExit(1)
          PY
